<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hi Frozen Food | Frozen Food Segar, Harga Bersahabat — Pontianak</title>
  <meta name="description" content="Hi Frozen Food Pontianak — Frozen food premium segar berkualitas, harga bersahabat. Order via WhatsApp, bayar QRIS atau COD. Buka setiap hari 08.00-20.00 WIB.">
  <meta name="keywords" content="frozen food pontianak, frozen food murah, nugget pontianak, kebab frozen, sosis, dimsum, order whatsapp">
  <meta property="og:title" content="Hi Frozen Food Pontianak">
  <meta property="og:description" content="Frozen Food Premium untuk Keluarga Anda — Segar, Berkualitas, Harga Bersahabat">
  <meta property="og:type" content="website">
  <link rel="canonical" href="https://hifrozenfood.github.io">
  <link rel="icon" type="image/png" href="assets/images/logo/LOGO.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  <link rel="stylesheet" href="assets/css/navbar.css">
  <link rel="stylesheet" href="assets/css/hero.css">
  <link rel="stylesheet" href="assets/css/about.css">
  <link rel="stylesheet" href="assets/css/products.css">
  <link rel="stylesheet" href="assets/css/howto.css">
  <link rel="stylesheet" href="assets/css/testimonial.css">
  <link rel="stylesheet" href="assets/css/contact.css">
  <link rel="stylesheet" href="assets/css/footer.css">
</head>

<body>

  <!-- Load sections via JS -->
  <script>
  (async () => {
    const sections = ['navbar','hero','stats','about','products','howto','testimonial','contact','footer'];
    for (const s of sections) {
      const html = await fetch('includes/' + s + '.html').then(r => r.text());
      const t = document.createElement('template');
      t.innerHTML = html;
      document.body.append(...Array.from(t.content.childNodes));
    }
    // Load scripts setelah semua section sudah ada di DOM
    ['animations','navbar','hero','products','testimonial'].forEach(name => {
      const el = document.createElement('script');
      el.src = 'assets/js/' + name + '.js';
      document.body.appendChild(el);
    });
  })();
  </script>

</body>
</html>
